<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #E82127;
}

.card {
    background: #141414;
    padding: 20px;
    border-radius: 20px;
}

.status {
    font-size: 22px;
    margin-bottom: 10px;
}

.progress-container {
    background: #333;
    height: 14px;
    border-radius: 20px;
    margin: 15px 0;
    overflow: hidden;
}

.progress-bar {
    height: 14px;
    background: linear-gradient(90deg, #E82127, #ff5a5f);
    width: 0%;
    transition: width 1s linear;
}

.data {
    font-size: 18px;
    margin: 6px 0;
}

button {
    background: #E82127;
    border: none;
    padding: 14px;
    border-radius: 10px;
    color: white;
    width: 100%;
    font-size: 18px;
    margin-top: 15px;
}

.banner {
    background: #E82127;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    display: none;
}
</style>
</head>

<body>

<h1>🚢 Morning Cecilie</h1>

<div id="banner" class="banner"></div>

<div class="card">
    <div id="status" class="status"></div>

    <div class="progress-container">
        <div id="bar" class="progress-bar"></div>
    </div>

    <div id="percent" class="data"></div>
    <div id="distance" class="data"></div>
    <div id="speed" class="data"></div>
