<script>

// ===== DATES =====
const start = new Date("2026-04-26");

// ✅ Africa route
const totalDistance = 25000;

// ✅ fixed ETA (Africa route)
const arrivalDate = new Date("2026-06-07");

// ===== UPDATE =====
function update() {

    const now = new Date();

    const total = arrivalDate - start;
    const passed = now - start;

    let progress = passed / total * 100;

    // ✅ prevent crash
    if (isNaN(progress)) progress = 0;

    progress = Math.max(0, Math.min(progress, 100));

    const remaining = totalDistance * (1 - progress / 100) * 0.85;

    // ===== UI =====
    document.getElementById("bar").style.width = progress + "%";

    document.getElementById("percent").innerText =
        "Progress: " + progress.toFixed(1) + "%";

    document.getElementById("distance").innerText =
        "Remaining: " + Math.round(remaining) + " km";

    document.getElementById("speed").innerText =
        "Speed: ~17 knots ⚡";

    // ===== STATUS =====
    let status = "";

    if (progress < 25) {
        status = "Indian Ocean (Madagascar) 🌊";
    } else if (progress < 45) {
        status = "Towards South Africa 🌍";
    } else if (progress < 60) {
        status = "Cape of Good Hope ⚓";
    } else if (progress < 80) {
        status = "Atlantic Ocean 🌊";
    } else {
        status = "Europe 🇪🇺";
    }

    document.getElementById("status").innerText = status;

    // ✅ simple stable ETA
    const daysArrival = Math.ceil((arrivalDate - now) / 86400000);

    // ✅ no Suez anymore
    document.getElementById("suez").innerText =
        "Route: via Africa 🌍";

    document.getElementById("arrival").innerText =
        "Arrival: " + Math.max(daysArrival, 0) + " days";

}

// ===== SAFE BANNER =====
function showBanner(text) {
    const b = document.getElementById("banner");
    if (!b) return;

    b.innerText = text;
    b.style.display = "block";
}

// ===== LINK =====
function openShip() {
    window.location.href =
        "https://www.vesselfinder.com/?imo=9477830";
}

// ===== LOOP =====
update();
setInterval(update, 10000);

</script>
