<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Tracker</title>
</head>

<body style="background:#0a0a0a;color:white;font-family:Arial;text-align:center;padding:20px;">

<h1 style="color:#E82127;">🚢 Morning Cecilie</h1>

<div id="status"></div>
<div id="progress"></div>
<div id="suez"></div>

<script>

const start = new Date("2026-04-26");
const suez = new Date("2026-05-22");

function update() {

    const now = new Date();

    const daysPassed = (now - start) / 86400000;

    let progress = Math.min(Math.max(daysPassed * 5, 0), 100);

    document.getElementById("status").innerText =
        "Ship is traveling...";

    document.getElementById("progress").innerText =
        "Progress: " + progress.toFixed(1) + "%";

    const daysSuez = Math.ceil((suez - now)/86400000);

    document.getElementById("suez").innerText =
        "Suez in: " + daysSuez + " days";
}

update();
setInterval(update, 5000);

</script>

</body>
</html>
