<script>

// ===== DATES =====
const start = new Date("2026-04-26");

// ✅ Africa route is longer
const totalDistance = 25000;

// ===== LIVE UPDATE =====
function update() {

    const now = new Date();

    const total = new Date("2026-06-07") - start; // new realistic ETA
    const passed = now - start;

    let progress = (passed / total) * 100;
    if (progress < 0) progress = 0;
    if (progress > 100) progress = 100;

    // ===== UI =====
    document.getElementById("bar").style.width = progress + "%";

    document.getElementById("percent").innerText =
        "Progress: " + progress.toFixed(1) + "%";

    // ✅ adjusted distance model for Africa route
    const remaining = totalDistance * (1 - progress / 100) * 0.85;

    document.getElementById("distance").innerText =
        "Remaining: " + Math.round(remaining) + " km";

    document.getElementById("speed").innerText =
        "Speed: ~17 knots ⚡";

    // ===== STATUS (Africa route) =====
    let status = "";

    if (progress < 25) {
        status = "Indian Ocean (near Madagascar) 🌊";
    } else if (progress < 45) {
        status = "Towards South Africa 🌍";
    } else if (progress < 60) {
        status = "Cape of Good Hope ⚓";
    } else if (progress < 80) {
        status = "Atlantic Ocean 🌊";
    } else {
        status = "Europe 🇪🇺";
    }

    document.getElementById("status").innerText = status;

    // ✅ NEW ETA (no Suez anymore!)
    const daysArrival = Math.ceil(remaining / 700) + 2;

    // show route instead of Suez
    document.getElementById("suez").innerText =
        "Route: via Africa 🌍";

    document.getElementById("arrival").innerText =
        "Arrival: " + daysArrival + " days";

    // ===== ALERT =====
    if (progress > 90 && !localStorage.getItem("alert2")) {
        showBanner("🇪🇺 Entering Europe soon!");
        localStorage.setItem("alert2", "1");
    }
}

// ===== BANNER =====
function showBanner(text) {
    const b = document.getElementById("banner");
    b.innerText = text;
    b.style.display = "block";

    if (navigator.vibrate) {
        navigator.vibrate([200,100,200]);
    }
}

// ===== LINK =====
function openShip() {
    window.location.href =
    "https://www.vesselfinder.com/?imo=9477830";
}

// ===== LOOP =====
update();
setInterval(update, 10000);

</script>
