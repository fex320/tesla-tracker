<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #0a0a0a;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #E82127;
    font-weight: 600;
}

/* CARD */
.card {
    background: #141414;
    padding: 25px;
    border-radius: 22px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* STATUS BADGE */
.status {
    font-size: 22px;
    margin-bottom: 12px;
    padding: 6px 14px;
    display: inline-block;
    border-radius: 999px;
    background: #1f1f1f;
}

/* PROGRESS BAR */
.progress-container {
    background: #333;
    height: 14px;
    border-radius: 20px;
    margin: 15px 0;
    overflow: hidden;
}

.progress-bar {
    height: 14px;
    background: linear-gradient(90deg, #E82127, #ff5a5f);
    width: 0%;
    transition: width 1s linear;
}

/* DATA */
.data {
    font-size: 18px;
    margin: 8px 0;
}

button {
    background: #E82127;
    border: none;
    padding: 14px;
    border-radius: 10px;
    color: white;
    width: 100%;
    font-size: 18px;
    margin-top: 15px;
}
