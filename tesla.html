<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Tracker</title>
</head>

<body style="background:#f2f2f2; font-family:Arial; padding:20px;">

<h2 style="color:#E82127; text-align:center; margin-bottom:10px;">
    🚢 Morning Cecilie
</h2>

<div id="status" style="text-align:center; font-size:20px; margin-bottom:20px;"></div>

<!-- CARD -->
<div style="background:white; padding:15px; border-radius:10px;">

    <h3 style="margin:0 0 10px 0; color:#333;">Progress</h3>
    <div id="percent" style="margin-bottom:10px;"></div>

    <h3 style="margin:15px 0 5px 0; color:#333;">Distance & Speed</h3>
    <div id="distance"></div>
    <div id="speed" style="margin-bottom:10px;"></div>

    <h3 style="margin:15px 0 5px 0; color:#333;">Route Checkpoints</h3>
    <div id="suez"></div>
    <div id="arrival" style="margin-bottom:10px;"></div>

    <h3 style="margin:15px 0 5px 0; color:#333;">Final Delivery</h3>
    <div id="vienna"></div>
    <div id="handover"></div>

</div>

<button onclick="openShip()" 
style="margin-top:20px; width:100%; padding:12px; background:#E82127; color:white; border:none; border-radius:8px; font-size:18px;">
Live Map
</button>

<script>
const start = new Date("2026-04-26");
const arrival = new Date("2026-06-02");
const suez = new Date("2026-05-22");
const totalDistance = 20000;

function update() {
    const now = new Date();
    const total = arrival - start;
    const passed = now - start;

    let progress = (passed / total) * 100;
    progress = Math.max(0, Math.min(100, progress));

    document.getElementById("percent").innerText =
        progress.toFixed(1) + "% completed";

    const remaining = totalDistance * (1 - progress / 100);
    document.getElementById("distance").innerText =
        "Remaining distance: " + Math.round(remaining) + " km";

    const totalHours = total / 3600000;
    const avgKnots = totalDistance / (totalHours * 1.852);
    document.getElementById("speed").innerText =
        "Average speed: " + avgKnots.toFixed(1) + " kn";

    let status = "";
    if (now < new Date("2026-05-15")) status = "Indian Ocean 🌊";
    else if (now < new Date("2026-05-20")) status = "Arabian Sea";
    else if (now < suez) status = "Red Sea 🐪";
    else status = "Europe 🇪🇺";

    document.getElementById("status").innerText =
        "Current region: " + status;

    document.getElementById("suez").innerText =
        "Days to Suez: " + Math.ceil((suez - now)/86400000);

    document.getElementById("arrival").innerText =
        "Days to Belgium arrival: " + Math.ceil((arrival - now)/86400000);

    const viennaArrival = new Date(arrival.getTime() + 4 * 86400000);
    document.getElementById("vienna").innerText =
        "Days to Vienna arrival: " + Math.ceil((viennaArrival - now)/86400000);

    const handoverDate = new Date(viennaArrival.getTime() + 3 * 86400000);
    document.getElementById("handover").innerText =
        "Estimated handover: " + handoverDate.toDateString();
}

function openShip() {
    window.location.href = "https://www.vesselfinder.com/?imo=9477830";
}

update();
setInterval(update, 10000);
</script>

</body>
</html>
