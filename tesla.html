<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tesla Tracker</title>

<style>
body {
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #E82127;
}

.card {
    background: #141414;
    padding: 20px;
    border-radius: 20px;
}

.progress-container {
    background: #333;
    height: 14px;
    border-radius: 20px;
    margin: 15px 0;
    overflow: hidden;
}

.progress-bar {
    height: 14px;
    background: linear-gradient(90deg, #E82127, #ff5a5f);
    width: 0%;
    transition: width 1s linear;
}

.data {
    margin: 8px 0;
    font-size: 18px;
}

button {
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #E82127;
    color: white;
    width: 100%;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🚢 Morning Cecilie</h1>

<div class="card">

<div id="status" class="data"></div>

<div class="progress-container">
    <div id="bar" class="progress-bar"></div>
</div>

<div id="progress" class="data"></div>
<div id="distance" class="data"></div>
<div id="speed" class="data"></div>
<div id="suez" class="data"></div>
<div id="arrival" class="data"></div>

<button onclick="openShip()">Open Live Map</button>

</div>

<script>

// ===== CONFIG =====
const start = new Date("2026-04-26");

// realistic distances (km)
const TOTAL_DISTANCE = 18000;
const SUEZ_DISTANCE = 14000;

// realistic speed
function getSpeed() {
    return 630 + Math.random() * 70; // ~630–700 km/day
}

// ===== UPDATE =====
function update() {

    const now = new Date();

    const daysPassed = (now - start) / 86400000;

    const speed = getSpeed();

    let traveled = daysPassed * speed;

    // clamp
    if (traveled < 0) traveled = 0;
    if (traveled > TOTAL_DISTANCE) traveled = TOTAL_DISTANCE;

    const remaining = TOTAL_DISTANCE - traveled;

    const progress = (traveled / TOTAL_DISTANCE) * 100;

    // ===== STATUS =====
    let status = "";

    if (traveled < 4300) {
        status = "Asia / Leaving China 🇨🇳";
    } else if (traveled < 10500) {
        status = "Indian Ocean 🌊";
    } else if (traveled < SUEZ_DISTANCE) {
        status = "Arabian Sea";
    } else if (traveled < 16000) {
        status = "Red Sea / Suez 🐪";
    } else {
        status = "Europe 🇪🇺";
    }

    // ===== ETA =====
    function daysTo(target) {
        return Math.max(0, Math.ceil((target - traveled) / speed));
    }

    // ===== UI =====
    document.getElementById("bar").style.width = progress + "%";

    document.getElementById("progress").innerText =
        "Progress: " + progress.toFixed(1) + "%";

    document.getElementById("distance").innerText =
        "Remaining: " + Math.round(remaining) + " km";

    document.getElementById("speed").innerText =
        "Speed: ~" + (speed / 27.78).toFixed(1) + " knots ⚡";

    document.getElementById("status").innerText = status;

    document.getElementById("suez").innerText =
        "Suez: " + daysTo(SUEZ_DISTANCE) + " days";

    document.getElementById("arrival").innerText =
        "Arrival: " + daysTo(TOTAL_DISTANCE) + " days";
}

// ===== BUTTON =====
function openShip() {
    window.location.href =
    "https://www.vesselfinder.com/?imo=9477830";
}

// ===== LOOP =====
update();
setInterval(update, 10000);

</script>

</body>
</html>
